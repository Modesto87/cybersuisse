<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste API Email - CyberSuisse</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007cba; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a87; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #cce7ff; color: #004085; border: 1px solid #99d6ff; }
    </style>
</head>
<body>
    <h1>🧪 Teste API Email - CyberSuisse</h1>
    <p><strong>Nota:</strong> Este ficheiro é apenas para testar a API. Não usar em produção.</p>
    
    <form id="testForm">
        <div class="form-group">
            <label for="prenom">Prénom:</label>
            <input type="text" id="prenom" name="prenom" value="João" required>
        </div>
        
        <div class="form-group">
            <label for="nom">Nom:</label>
            <input type="text" id="nom" name="nom" value="Silva" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="joao.silva@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="telephone">Téléphone:</label>
            <input type="tel" id="telephone" name="telephone" value="+41 79 123 45 67">
        </div>
        
        <div class="form-group">
            <label for="entreprise">Entreprise:</label>
            <input type="text" id="entreprise" name="entreprise" value="Test Company SA">
        </div>
        
        <div class="form-group">
            <label for="service">Service:</label>
            <select id="service" name="service" required>
                <option value="">Sélectionner...</option>
                <option value="pentest" selected>Audit de sécurité / Pentest</option>
                <option value="cra">Conformité CRA</option>
                <option value="surveillance">Surveillance continue</option>
                <option value="developpement">Développement sécurisé</option>
                <option value="dfir">DFIR / Incident Response</option>
                <option value="formation">Formation</option>
                <option value="autre">Autre</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="budget">Budget indicatif:</label>
            <select id="budget" name="budget">
                <option value="">Non spécifié</option>
                <option value="moins-5k" selected>Moins de 5'000 CHF</option>
                <option value="5k-15k">5'000 - 15'000 CHF</option>
                <option value="15k-50k">15'000 - 50'000 CHF</option>
                <option value="plus-50k">Plus de 50'000 CHF</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="urgence">Urgence:</label>
            <select id="urgence" name="urgence">
                <option value="normale" selected>Normale (24-48h)</option>
                <option value="urgent">Urgent (< 24h)</option>
                <option value="critique">Critique (< 4h)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required>Ceci est un message de test pour vérifier que l'API email fonctionne correctement.</textarea>
        </div>
        
        <button type="submit" id="submitBtn">🧪 Tester l'envoi</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Envoi en cours...';
            
            // Get form data
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Add CSRF token (simple one for testing)
            data.csrfToken = 'test-token-' + Date.now();
            data.timestamp = Date.now();
            
            try {
                console.log('Envoi des données:', data);
                
                const response = await fetch('/api/send-email.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                console.log('Réponse API:', result);
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            ✅ <strong>Succès!</strong><br>
                            Message: ${result.message}<br>
                            ID: ${result.messageId || 'N/A'}<br>
                            Urgence: ${result.urgence}<br>
                            ${result.urgence === 'critique' ? '🚨 Message marqué comme critique!' : ''}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            ❌ <strong>Erreur!</strong><br>
                            Code: ${result.code || response.status}<br>
                            Message: ${result.error || 'Erreur inconnue'}<br>
                            ${result.errors ? 'Erreurs: ' + JSON.stringify(result.errors) : ''}
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ <strong>Erreur de connexion!</strong><br>
                        ${error.message}
                    </div>
                `;
            }
            
            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = '🧪 Tester l\'envoi';
        });
        
        // Display current URL for reference
        document.addEventListener('DOMContentLoaded', function() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="result info">
                    ℹ️ <strong>URL de test:</strong> ${window.location.href}<br>
                    <strong>API endpoint:</strong> ${window.location.origin}/api/send-email.php
                </div>
            `;
        });
    </script>
</body>
</html>
