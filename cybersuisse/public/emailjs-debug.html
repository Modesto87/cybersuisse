<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Debug EmailJS - CyberSuisse</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f8f9fa;
            color: #343a40;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .info-box, .success-box, .error-box {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid;
        }
        .info-box { background-color: #e7f3ff; border-color: #90caff; }
        .success-box { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error-box { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin: 5px;
            transition: background-color 0.2s ease;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #c0c0c0; cursor: not-allowed; }
        .log {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log div {
            padding: 2px 0;
            border-bottom: 1px solid #3a3f4b;
        }
        .log div:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug EmailJS - CyberSuisse</h1>
        
        <div class="info-box">
            <h3>Informations de la Page</h3>
            <p><strong>URL:</strong> <span id="current-url"></span></p>
            <p><strong>Domaine:</strong> <span id="current-domain"></span></p>
        </div>

        <div class="info-box">
            <h3>Configuration EmailJS</h3>
            <p><strong>Service ID:</strong> <span id="service-id"></span></p>
            <p><strong>Template ID:</strong> <span id="template-id"></span></p>
            <p><strong>Public Key:</strong> <span id="public-key"></span></p>
        </div>

        <h2>Actions</h2>
        <button onclick="runTest()">📧 Lancer le Test</button>
        <button onclick="clearLog()">🗑️ Effacer Logs</button>

        <div id="log" class="log"></div>
    </div>

    <script>
        const SERVICE_ID = 'service_lacfz9z';
        const TEMPLATE_ID = 'template_xo9h05q';
        const PUBLIC_KEY = 'Tb9xfIwiSJzAF34-x'; // NOUVELLE CLÉ

        // Affichage des infos
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('current-domain').textContent = window.location.hostname;
        document.getElementById('service-id').textContent = SERVICE_ID;
        document.getElementById('template-id').textContent = TEMPLATE_ID;
        document.getElementById('public-key').textContent = PUBLIC_KEY;

        const logDiv = document.getElementById('log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff6b6b' : type === 'success' ? '#69f0ae' : '#82aaff';
            logDiv.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            logDiv.innerHTML = '';
            log('Logs effacés.', 'info');
        }

        async function runTest() {
            const button = document.querySelector('button');
            button.disabled = true;
            button.textContent = 'Test en cours...';
            
            log('🚀 Démarrage du test EmailJS...', 'info');
            
            try {
                log(`1. Initialisation avec la clé publique: ${PUBLIC_KEY}`, 'info');
                emailjs.init(PUBLIC_KEY);
                log('✅ Clé publique initialisée.', 'success');

                const params = {
                    from_name: 'Test Debug CyberSuisse',
                    from_email: 'debug@cybersuisse.ch',
                    phone: '+41 00 000 00 00',
                    company: 'Debug Inc.',
                    service: 'Test de Débogage',
                    budget: 'N/A',
                    urgency: 'critique',
                    message: `Test envoyé depuis: ${window.location.href}\nDate: ${new Date().toLocaleString()}`
                };
                log('2. Préparation des paramètres du template:\n' + JSON.stringify(params, null, 2), 'info');

                log(`3. Envoi de l'email via service '${SERVICE_ID}' et template '${TEMPLATE_ID}'...`, 'info');
                const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, params);
                log('✅ SUCCÈS! Réponse du serveur:\n' + JSON.stringify(response, null, 2), 'success');
                alert('✅ Email envoyé avec succès! Vérifiez votre boîte de réception.');

            } catch (error) {
                log('❌ ERREUR: ' + (error.text || JSON.stringify(error)), 'error');
                
                if (error.status === 400) {
                    log('🔍 Diagnostic: Erreur 400 - The service_id, template_id or user_id is invalid. Vérifiez que les IDs et la clé publique sont corrects.', 'error');
                } else if (error.status === 403) {
                    log('🔍 Diagnostic: Erreur 403 - Unauthorized. Le domaine n\'est pas autorisé. Ajoutez ce domaine dans la whitelist de votre clé API sur le dashboard EmailJS.', 'error');
                }
                
                alert('❌ Erreur lors de l\'envoi. Consultez les logs pour plus de détails.');
            } finally {
                button.disabled = false;
                button.textContent = '📧 Lancer le Test';
            }
        }

        log('Page de débogage prête.', 'info');
    </script>
</body>
</html>
